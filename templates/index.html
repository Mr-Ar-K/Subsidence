<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsidence Calculator - Web Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 25px;
            overflow-y: auto;
        }

        .control-panel {
            max-height: 90vh;
        }

        .visualization-panel {
            grid-column: 2;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h2 {
            color: #555;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #666;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .points-container {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .point-group {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }

        .point-group input {
            margin-bottom: 6px;
        }

        .point-group label {
            margin-bottom: 4px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .report {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
        }

        .report-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .report-row:last-child {
            border-bottom: none;
        }

        .report-label {
            font-weight: 600;
            color: #666;
        }

        .report-value {
            color: #333;
            font-weight: 600;
        }

        #visualization {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: 600px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 2px solid #f88;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }

            .visualization-panel {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel control-panel">
            <h1>Subsidence Calculator</h1>

            <div class="error" id="error"></div>

            <div>
                <h2>Panel Points</h2>
                <div class="form-group">
                    <label for="num_points">Number of Points:</label>
                    <input type="number" id="num_points" name="num_points" min="3" max="10" value="4">
                </div>
                <button class="btn btn-secondary" onclick="generatePointInputs()">Update Points</button>

                <div class="points-container" id="points-container"></div>
            </div>

            <h2>Parameters</h2>
            <div class="form-group">
                <label for="thickness">Panel Thickness h (m):</label>
                <input type="number" id="thickness" name="thickness" step="0.1" value="2.5" min="0">
            </div>

            <div class="form-group">
                <label for="depth_of_cover">Depth of Cover H (m):</label>
                <input type="number" id="depth_of_cover" name="depth_of_cover" step="10" value="300" min="0">
            </div>

            <div class="form-group">
                <label for="extraction_ratio">Extraction Ratio e:</label>
                <select id="extraction_ratio" name="extraction_ratio">
                    <option value="1.0">1.0 - Longwall</option>
                    <option value="0.7">0.7 - Board and Pillar</option>
                </select>
            </div>

            <div class="form-group">
                <label for="subsidence_factor">Subsidence Factor a:</label>
                <input type="number" id="subsidence_factor" name="subsidence_factor" step="0.1" value="0.5" min="0">
            </div>

            <div class="form-group">
                <label for="new_ratio">NEW Ratio W(new)/H:</label>
                <input type="number" id="new_ratio" name="new_ratio" step="0.1" value="1.4" min="0">
            </div>

            <div class="form-group">
                <label for="angle_of_draw">Angle of Draw α (deg):</label>
                <input type="number" id="angle_of_draw" name="angle_of_draw" step="1" value="35" min="0" max="90">
            </div>

            <div class="form-group">
                <label for="mesh_spacing">Mesh Grid Spacing (m):</label>
                <input type="number" id="mesh_spacing" name="mesh_spacing" step="1" value="25" min="1">
            </div>

            <button class="btn btn-primary" onclick="calculateSubsidence()">Calculate & Visualize</button>

            <div class="report" id="report" style="display: none;">
                <h2 style="margin-top: 0;">Results</h2>
                <div class="report-row">
                    <span class="report-label">Max Subsidence:</span>
                    <span class="report-value" id="s_max">-</span>
                </div>
                <div class="report-row">
                    <span class="report-label">Influence Distance:</span>
                    <span class="report-value" id="influence_distance">-</span>
                </div>
                <div class="report-row">
                    <span class="report-label">Influenced Points:</span>
                    <span class="report-value" id="num_points_result">-</span>
                </div>
                <div class="report-row">
                    <span class="report-label">Average Subsidence:</span>
                    <span class="report-value" id="avg_subsidence">-</span>
                </div>
                <div class="report-row">
                    <span class="report-label">Max Point Subsidence:</span>
                    <span class="report-value" id="max_subsidence">-</span>
                </div>
            </div>
        </div>

        <div class="panel visualization-panel">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Calculating subsidence...</p>
            </div>
            <div id="visualization"></div>
        </div>
    </div>

    <script>
        function generatePointInputs() {
            const numPoints = parseInt(document.getElementById('num_points').value);
            const container = document.getElementById('points-container');
            container.innerHTML = '';

            const defaultPoints = [
                { e: 0, n: 0 },
                { e: 100, n: 0 },
                { e: 100, n: 100 },
                { e: 0, n: 100 }
            ];

            for (let i = 0; i < numPoints; i++) {
                const point = defaultPoints[i] || { e: 0, n: 0 };
                const pointDiv = document.createElement('div');
                pointDiv.className = 'point-group';
                pointDiv.innerHTML = `
                    <label>Point ${i + 1}</label>
                    <label style="font-size: 12px;">Easting (E)</label>
                    <input type="number" id="point_${i}_e" value="${point.e}" step="1">
                    <label style="font-size: 12px;">Northing (N)</label>
                    <input type="number" id="point_${i}_n" value="${point.n}" step="1">
                `;
                container.appendChild(pointDiv);
            }
        }

        async function calculateSubsidence() {
            const errorDiv = document.getElementById('error');
            errorDiv.classList.remove('active');

            const loading = document.getElementById('loading');
            loading.classList.add('active');

            try {
                const numPoints = parseInt(document.getElementById('num_points').value);
                const formData = new FormData();

                formData.append('num_points', numPoints);
                for (let i = 0; i < numPoints; i++) {
                    formData.append(`point_${i}_e`, parseFloat(document.getElementById(`point_${i}_e`).value));
                    formData.append(`point_${i}_n`, parseFloat(document.getElementById(`point_${i}_n`).value));
                }

                formData.append('thickness', parseFloat(document.getElementById('thickness').value));
                formData.append('depth_of_cover', parseFloat(document.getElementById('depth_of_cover').value));
                formData.append('extraction_ratio', parseFloat(document.getElementById('extraction_ratio').value));
                formData.append('subsidence_factor', parseFloat(document.getElementById('subsidence_factor').value));
                formData.append('new_ratio', parseFloat(document.getElementById('new_ratio').value));
                formData.append('angle_of_draw', parseFloat(document.getElementById('angle_of_draw').value));
                formData.append('mesh_spacing', parseFloat(document.getElementById('mesh_spacing').value));

                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.status === 'error') {
                    throw new Error(data.message);
                }

                // Display visualization
                document.getElementById('visualization').innerHTML = data.plot_html;

                // Display report
                document.getElementById('s_max').textContent = (data.report.s_max * 1000).toFixed(0) + ' mm';
                document.getElementById('influence_distance').textContent = data.report.influence_distance.toFixed(2) + ' m';
                document.getElementById('num_points_result').textContent = data.report.num_points;
                document.getElementById('avg_subsidence').textContent = (data.report.average_subsidence * 1000).toFixed(2) + ' mm';
                document.getElementById('max_subsidence').textContent = (data.report.max_subsidence * 1000).toFixed(2) + ' mm';
                document.getElementById('report').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.classList.add('active');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            generatePointInputs();
            calculateSubsidence();
        });
    </script>
</body>
</html>
